    <!-- CSS -->
    
    <style>
        *{
    margin:0;

}

body{

    position:absolute;

    background-size:cover;

    align-items:center;

#startScreen h1{
    font-size:50px;

#startBtn{
    margin-top:20px;

#score{

/* Game Area */
#gameArea{
    width:100%;
    max-width:400px;
    height:100vh;
    margin:auto;
    background:#555;

    overflow:hidden;
    border-left:5px solid #fff;

}

/* Road Line */
.line{
    position:absolute;
    width:10px;
    height:100px;
    background:#fff;
    left:50%;
    transform:translateX(-50%);
}

/* Player Car */
.player{
    position:absolute;
    width:60px;
    height:110px;
    bottom:20px;
    left:170px;
}

.player .body{
    width:60px;
    height:110px;
    background:red;
    border-radius:12px;
    position:absolute;
}

.player .glass{
    width:40px;
    height:25px;
    background:skyblue;
    position:absolute;
    left:10px;
    top:12px;
    border-radius:5px;
}

.player .backglass{
    width:40px;
    height:20px;
    background:skyblue;
    position:absolute;
    left:10px;
    bottom:12px;
    border-radius:5px;
}

.player .wheel{
    width:10px;
    height:22px;
    background:black;
    position:absolute;
}

.w1{left:-5px;top:15px;}
.w2{right:-5px;top:15px;}
.w3{left:-5px;bottom:15px;}
.w4{right:-5px;bottom:15px;}

/* Enemy Car */
.enemy{
    position:absolute;
    width:60px;
    height:110px;
    border-radius:12px;
}

.enemy .body{
    width:100%;
    height:100%;
    background:yellow;
    border-radius:12px;
}
    #controls{position:absolute;bottom:20px;width:100%;display:flex;justify-content:space-around;padding:0 20px;z-index:150;}
    #controls button{width:70px;height:70px;font-size:25px;border:none;border-radius:50%;background:#fff;color:#111;cursor:pointer;opacity:0.7;}
    #controls button:active{opacity:1;background:#ddd;}


.enemy .glass{
    width:40px;
    height:25px;
    background:skyblue;
    position:absolute;
    left:10px;

}

.enemy .wheel{
    width:10px;

    position:absolute;
}

.enemy .w1{left:-5px;top:15px;}
.enemy .w2{right:-5px;top:15px;}

.enemy .w4{right:-5px;bottom:15px;}

/* Explosion */
.explosion{
    position:absolute;
    font-size:70px;
    display:none;
    z-index:200;
}

/* Mobile */
@media(max-width:500px){

    #gameArea{
        width:100%;
        border-left:3px solid white;
        border-right:3px solid white;
    }

    #startBtn{
        font-size:28px;
        padding:12px 25px;
    }

        font-size:35px;
    }

    #score{
        font-size:20px;
    }

    </style>

    <title>N.S Car Racing</title>
</head>
<body>

    <!-- Start Screen -->
    <div id="startScreen">
        <h1>🏎💕 N.S Racing Game</h1>

        <button id="startBtn">
            <marquee>Start</marquee>
        </button>
    </div>

    <!-- Score -->
    <div id="score">Score : 0</div>

    <!-- Game Area -->
    <div id="gameArea">
         
        <div id="controls">
            
      <button id="leftBtn">⬅️</button>
      <button id="rightBtn">➡️</button>
      
    
        </div>

        <!-- Player Car -->
        <div class="player" id="player">
            <div class="body"></div>
            <div class="glass"></div>
            <div class="backglass"></div>

            <div class="wheel w1"></div>
            <div class="wheel w2"></div>
            <div class="wheel w3"></div>
            <div class="wheel w4"></div>
        </div>

        <!-- Explosion -->
        <div class="explosion" id="boom">💑</div>

    </div>
    <

    <!-- JavaScript -->
    <script >
        const gameArea = document.getElementById("gameArea");
const player = document.getElementById("player");
const startBtn = document.getElementById("startBtn");
const startScreen = document.getElementById("startScreen");
const scoreBoard = document.getElementById("score");
const boom = document.getElementById("boom");

let game = {
    speed: 5,
    score: 0,
    start: false
};

let playerX = 170;
let playerSpeed = 5;

// Road Lines
for(let i = 0; i < 8; i++){
    let roadLine = document.createElement("div");
    roadLine.classList.add("line");
    roadLine.y = i * 150;
    roadLine.style.top = roadLine.y + "px";
    gameArea.appendChild(roadLine);
}

// Keyboard Controls
const keys = {
    ArrowLeft:false,
    ArrowRight:false,
    ArrowUp:false,
    ArrowDown:false
};

document.addEventListener("keydown",(e)=>{
    if(keys.hasOwnProperty(e.key)){
        keys[e.key] = true;
    }
});

document.addEventListener("keyup",(e)=>{
    if(keys.hasOwnProperty(e.key)){
        keys[e.key] = false;
    }
});

// Create Enemy
function createEnemy(topPos){

    let enemy = document.createElement("div");
    enemy.classList.add("enemy");

    enemy.innerHTML = `
        <div class="body"></div>
        <div class="glass"></div>

        <div class="wheel w1"></div>
        <div class="wheel w2"></div>
        <div class="wheel w3"></div>
        <div class="wheel w4"></div>
    `;

    enemy.style.left = (Math.floor(Math.random()*5)*70+20) + "px";
    enemy.style.top = topPos + "px";

    gameArea.appendChild(enemy);
}

createEnemy(-200);
createEnemy(-450);
createEnemy(-700);

// Start Game
startBtn.addEventListener("click",()=>{

    startScreen.style.display = "none";
    game.start = true;

    window.requestAnimationFrame(playGame);

});

// Move Road Lines
function moveLines(){

    let lines = document.querySelectorAll(".line");

    lines.forEach(line=>{

        line.y += game.speed;

        if(line.y > window.innerHeight){
            line.y = -120;
        }

        line.style.top = line.y + "px";

    });

}

// Move Enemy Cars
function moveEnemy(){

    let enemies = document.querySelectorAll(".enemy");

    enemies.forEach(enemy=>{

        let y = parseInt(enemy.style.top);

        y += game.speed + 2;

        if(y > window.innerHeight){

            y = -250;

            enemy.style.left =
            (Math.floor(Math.random()*5)*70+20) + "px";

            game.score++;

            scoreBoard.innerHTML =
            "Score : " + game.score;

            if(game.score % 10 == 0){
                game.speed++;
            }

        }

        enemy.style.top = y + "px";

        if(isCollide(player,enemy)){
            crash(enemy);
        }

    });

}

// Collision Check
function isCollide(a,b){

    let aRect = a.getBoundingClientRect();
    let bRect = b.getBoundingClientRect();

    return !(
        aRect.bottom < bRect.top ||
        aRect.top > bRect.bottom ||
        aRect.right < bRect.left ||
        aRect.left > bRect.right
    );

}

// Crash
function crash(enemy){

    game.start = false;

    boom.style.display = "block";

    boom.style.left = player.offsetLeft - 10 + "px";
    boom.style.top = player.offsetTop - 20 + "px";

    player.style.transform = "rotate(45deg) scale(1.2)";
    enemy.style.transform = "rotate(-45deg) scale(1.2)";

}
// ===========================
// Game Over Screen
// ===========================
setTimeoutGame = () => {
    setTimeout(() => {

        startScreen.style.display = "flex";

        startScreen.innerHTML = `
            <h1>Game Over</h1>
            <p>Score : ${game.score}</p>
            <button onclick="resetGame()">फिर से चालू करे 🚗</button>
        `;

    },1000);
};

// Reset Game
function resetGame(){

    game.speed = 5;
    game.score = 0;
    game.start = true;

    playerX = 170;

    player.style.left = playerX + "px";
    player.style.transform = "none";

    boom.style.display = "none";

    scoreBoard.innerHTML = "Score : 0";

    document.querySelectorAll(".enemy").forEach((enemy,i)=>{

        enemy.style.top = (-250 * (i+1)) + "px";
        enemy.style.transform = "none";

    });

    startScreen.style.display = "none";

    window.requestAnimationFrame(playGame);

}

// Mobile Touch Controls
let touchStartX = 0;

gameArea.addEventListener("touchstart",(e)=>{
    touchStartX = e.touches[0].clientX;
});

gameArea.addEventListener("touchmove",(e)=>{

    if(!game.start) return;

    let touchX = e.touches[0].clientX;

    const maxMove = gameArea.clientWidth - player.offsetWidth;

    if(touchX < touchStartX && playerX > 0){
        playerX -= playerSpeed;
    }

    if(touchX > touchStartX && playerX < maxMove){
        playerX += playerSpeed;
    }

    player.style.left = playerX + "px";

    touchStartX = touchX;


});
 // Left Right Button Controls
const leftBtn = document.getElementById("leftBtn");
const rightBtn = document.getElementById("rightBtn");

leftBtn.addEventListener("touchstart", () => {
    keys.ArrowLeft = true;
});

leftBtn.addEventListener("touchend", () => {
    keys.ArrowLeft = false;
});

rightBtn.addEventListener("touchstart", () => {
    keys.ArrowRight = true;
});

rightBtn.addEventListener("touchend", () => {
    keys.ArrowRight = false;
});

// PC Mouse Support
leftBtn.addEventListener("mousedown", () => {
    keys.ArrowLeft = true;
});

leftBtn.addEventListener("mouseup", () => {
    keys.ArrowLeft = false;
});

rightBtn.addEventListener("mousedown", () => {
    keys.ArrowRight = true;
});

rightBtn.addEventListener("mouseup", () => {
    keys.ArrowRight = false;
});

// Main Game Loop
function playGame(){

    if(!game.start) return;

    moveLines();
    moveEnemy();

    const maxMove = gameArea.clientWidth - player.offsetWidth;

    // Keyboard Controls
    if(keys.ArrowLeft && playerX > 0){
        playerX -= playerSpeed;
    }

    if(keys.ArrowRight && playerX < maxMove){
        playerX += playerSpeed;
    }

    player.style.left = playerX + "px";

    window.requestAnimationFrame(playGame);

}

// Crash Function ko Complete karo
function crash(enemy){

    game.start = false;

    boom.style.display = "block";

    boom.style.left = player.offsetLeft - 10 + "px";
    boom.style.top = player.offsetTop - 20 + "px";

    player.style.transform = "rotate(45deg) scale(1.2)";
    enemy.style.transform = "rotate(-45deg) scale(1.2)";

    setTimeoutGame();

}


    </script>

</body>
</html>
