    <body>
        <p id="km">Check Your Pin Is Correct or Not

        </p>
        <p id="P"></p>
        <input   placeholder="Enter 6 digit Code " required type="number" id="t1"/>
        <button onclick="demo()" id="btn">Check</button>
        
        

        </p>
        <script>
            function demo()
            {
            
                var p=document.getElementById("P");
                var t=document.getElementById("t1");
                var len=t.value.length;
                var x=document.getElementById("btn");
                if(/^\d{6}$/.test(t.value))
                {
                    p.innerText="Valid Pincode"
                    p.style.color="white"
                
                    p.style.marginLeft="150px"
                    p.style.marginRight="150px"
                    p.style.fontSize="150px"
                    p.style.border="5px solid black"
                    p.style.backgroundColor="Green"

                    p.style.borderRadius="55px"
                    p.style.paddingRight="50px"
                    p.style.paddingLeft="50px"
                    p.style.textAlign="Center"
                    
                
                    t.style.border="3px solid black"
                    t.style.color="green"
                    btn.style.background="green"
                    
                    bt.style.border="none"
                }
                else
                {
                    p.innerText="Invalid Pincode"
                    p.style.color="White"
                    p.style.marginLeft="150px"
                    p.style.marginRight="150px"
                    p.style.fontSize="150px"
                    p.style.border="5px solid black"
                    p.style.backgroundColor="Red"
                    p.style.animation="Shake"

                    p.style.borderRadius="55px"
                    p.style.paddingRight="50px"
                    p.style.paddingLeft="50px"
                    p.style.textAlign="Center"
                    

                    t.style.border="3px solid red"
                    t.style.color="red"
                    btn.style.background="red"
                    bt.style.border="none"
                }
            }
        </script>
